<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap de Producto — Del Excel al punto de venta inteligente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #171B26;
    --bg: #EEF0F3;
    --surface: #FFFFFF;
    --surface-tint: #FAFBFC;
    --hairline: #E7E9EE;
    --hairline-strong: #DADDE4;
    --muted: #6B7280;
    --muted-2: #9AA1AC;
    --brand: #2B4C6F;
    --brand-tint: #EEF3F8;
    --gold: #C7862B;
    --gold-tint: #FBF1E1;
    --gold-border: #EAD3A6;
    --teal: #1E8F6D;
    --teal-tint: #E7F5EF;
    --teal-border: #B9E1D0;
    --slate: #7A8598;
    --slate-tint: #EEF0F3;
    --slate-border: #DCE0E7;
    --radius: 16px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --shadow-card: 0 1px 3px rgba(23,27,38,0.06), 0 14px 32px -16px rgba(23,27,38,0.22);
    --shadow-card-hover: 0 1px 3px rgba(23,27,38,0.07), 0 18px 38px -14px rgba(23,27,38,0.26);
    --accent-1: #2B4C6F;
    --accent-1-tint: #EDF3F9;
    --accent-2: #1E8F6D;
    --accent-2-tint: #EBF6F1;
    --accent-3: #C7862B;
    --accent-3-tint: #FCF3E5;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    padding: 64px 20px 96px;
  }

  .page{ max-width: 860px; margin: 0 auto; }

  /* ---------- HERO ---------- */
  .hero{ margin-bottom: 40px; opacity:0; animation: fadeUp .7s ease forwards; }
  .eyebrow{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--brand);
    display:flex; align-items:center; gap:10px;
    margin-bottom: 18px;
    font-weight: 500;
  }
  .eyebrow::before{
    content:''; width: 26px; height: 2px; background: var(--brand); border-radius: 2px;
  }
  .hero h1{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(30px, 5vw, 44px);
    line-height: 1.1;
    margin: 0 0 16px;
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .hero p{
    font-size: 16px;
    line-height: 1.65;
    color: var(--muted);
    max-width: 58ch;
    margin: 0 0 24px;
  }

  .legend{ display:flex; gap: 22px; flex-wrap: wrap; }
  .legend-item{
    display:flex; align-items:center; gap: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }
  .legend-dot{ width: 8px; height: 8px; border-radius: 50%; flex-shrink:0; }

  /* ---------- TIMELINE ---------- */
  .timeline{ position: relative; margin-top: 48px; }

  .phase{
    position: relative;
    padding-left: 64px;
    opacity: 0;
    animation: fadeUp .6s ease forwards;
  }
  .phase:nth-of-type(1){ animation-delay: .12s; }
  .phase:nth-of-type(2){ animation-delay: .22s; }
  .phase:nth-of-type(3){ animation-delay: .32s; }

  .spine{
    position:absolute; left: 19px; top: 44px; bottom: -36px;
    width: 0; border-left: 2px dashed var(--hairline-strong);
  }
  .phase:last-child .spine{ display:none; }

  .node{
    position:absolute; left: 0; top: 2px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--node-color, var(--slate));
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 14px;
    color: var(--node-color, var(--slate));
    box-shadow: 0 0 0 5px var(--bg), 0 2px 6px rgba(23,27,38,0.08);
  }
  .node svg{ width: 16px; height:16px; }

  .card{
    background: var(--surface);
    background-image: linear-gradient(var(--card-tint, transparent), var(--card-tint, transparent));
    border: 1px solid var(--hairline-strong);
    border-left: 4px solid var(--card-accent, var(--brand));
    border-radius: var(--radius);
    margin-bottom: 18px;
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: box-shadow .25s ease, border-color .25s ease;
  }
  .card:hover{ box-shadow: var(--shadow-card-hover); }
  .card.phase-1{ --card-accent: var(--accent-1); --card-tint: var(--accent-1-tint); }
  .card.phase-2{ --card-accent: var(--accent-2); --card-tint: var(--accent-2-tint); }
  .card.phase-3{ --card-accent: var(--accent-3); --card-tint: var(--accent-3-tint); }

  .card-head{
    display:flex; gap: 16px; align-items:flex-start; justify-content: space-between;
    padding: 22px 24px;
    cursor: pointer;
    user-select: none;
  }

  .card-head-main{ flex: 1; min-width: 0; }
  .phase-label{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--card-accent, var(--muted-2));
    margin-bottom: 7px;
    font-weight: 600;
  }
  .phase-title{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 19px;
    color: var(--ink);
    margin: 0 0 9px;
    line-height: 1.3;
  }
  .phase-goal{
    font-size: 14px;
    line-height: 1.65;
    color: var(--muted);
    margin: 0;
    max-width: 62ch;
  }

  .card-head-side{
    display:flex; flex-direction: column; align-items:flex-end; gap: 12px; flex-shrink:0;
  }
  .chevron{
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--hairline-strong);
    background: var(--surface-tint);
    display:flex; align-items:center; justify-content:center;
    transition: transform .35s ease, background .2s ease;
    flex-shrink: 0;
  }
  .chevron svg{ width: 12px; height: 12px; stroke: var(--muted); }
  .card.is-open .chevron{ transform: rotate(180deg); background: var(--brand-tint); }
  .card.is-open .chevron svg{ stroke: var(--brand); }

  .card-body-wrap{
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows .4s ease;
  }
  .card.is-open .card-body-wrap{ grid-template-rows: 1fr; }
  .card-body-inner{ overflow: hidden; }

  .card-body{
    padding: 4px 24px 22px;
    border-top: 1px dashed var(--hairline-strong);
    margin: 0 24px;
    display: flex;
    flex-direction: column;
  }

  .req{
    padding: 16px 0;
    border-bottom: 1px solid var(--hairline);
  }
  .req:last-child{ border-bottom: none; }
  .req-title{
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    margin: 0 0 5px;
  }
  .req-desc{
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--muted);
    margin: 0;
  }
  .req-why{
    display:flex; gap: 8px;
    margin-top: 10px;
    padding: 9px 12px;
    background: var(--gold-tint);
    border: 1px solid var(--gold-border);
    border-radius: 9px;
    font-size: 12.5px;
    line-height: 1.55;
    color: #8A5D1F;
  }
  .req-why svg{ width: 13px; height: 13px; margin-top: 3px; flex-shrink:0; stroke: var(--gold); }

  /* ---------- CONNECTOR ---------- */
  .connector{
    position: relative;
    padding-left: 64px;
    margin: -2px 0 18px;
  }
  .connector-line-wrap{
    position:relative;
    padding: 6px 18px 6px 20px;
  }
  .connector p{
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
    color: var(--muted-2);
    margin: 0;
    padding-left: 4px;
    border-left: 2px dotted var(--hairline-strong);
    margin-left: -1px;
  }

  /* ---------- FOOTER ---------- */
  .foot{
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--hairline);
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--muted-2);
    text-align: center;
  }

  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(10px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }

  @media (max-width: 620px){
    body{ padding: 44px 14px 72px; }
    .phase{ padding-left: 48px; }
    .connector{ padding-left: 48px; }
    .node{ width: 34px; height: 34px; left: 0; }
    .spine{ left: 16px; }
    .card-head{ padding: 20px 16px; }
    .card-body{ margin: 0 16px; padding: 4px 0 18px; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="hero">
    <div class="eyebrow">Roadmap de producto</div>
    <h1>Del Excel al punto de venta inteligente</h1>
    <p>Tres fases para reemplazar la planilla de promociones por una plataforma que cotiza, factura y vende sola. Cada fase se apoya técnica y funcionalmente en la anterior.</p>
  </div>

  <div class="timeline" id="timeline"></div>

</div>

<script>
const ICONS = {
  check: '<svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>',
  chevron: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>',
  spark: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></svg>'
};

const accentColors = {
  1: 'var(--accent-1)',
  2: 'var(--accent-2)',
  3: 'var(--accent-3)'
};

const phases = [
  {
    number: 1,
    name: 'MVP — Reemplazo del Excel de promociones',
    status: 'pendiente',
    goal: 'Eliminar la dependencia del Excel: catálogo, cotizador y motor de promociones robusto que alivia la carga operativa de los vendedores y el proceso de auditoría. La facturación final sigue en Softland — la app arma la operación completa y la envía como nota de pedido.',
    items: [
      { t:'Gestión de usuarios y roles', d:'Inicio de sesión con perfiles Vendedor, Supervisor, Administrador comercial y Administrador IT; permisos diferenciados y registro de quién consulta y modifica.', w:'Reemplaza el acceso libre y anónimo actual; requisito de auditoría y seguridad.' },
      { t:'Motor de promociones (4 clústeres)', d:'Backoffice centralizado para crear campañas cruzando Producto/Familia, Medio de pago, Cliente (afiliado/externo) y Sucursal; reglas de acumulación y prioridad.', w:'Es el corazón del sistema: reemplaza las tablas semirrígidas del Excel y elimina su actualización manual.' },
      { t:'Vigencia automática de ofertas', d:'Cada campaña tiene fecha de inicio y fin; una oferta vencida deja de mostrarse y no puede aplicarse.', w:'Hoy la validación existe en el Excel y es crítica: no puede perderse en el reemplazo.' },
      { t:'Búsqueda tipo marketplace sobre todo el catálogo', d:'Búsqueda por familia o descripción con filtros dinámicos, además de búsqueda directa por SKU. Resalta visualmente los productos en promoción o campaña.', w:'Refleja cómo compra el cliente real (no conoce el SKU) y elimina el sesgo de ventas/ofertas del Excel.' },
      { t:'Ficha de oferta del producto', d:'Precios diferenciados externo/afiliado, tipo de oferta, descuento por pago contado, medios de pago con cuotas sin interés y tope por entidad. Oculta datos sensibles de la vista del cliente si así se requiere.', w:'Es la función esencial del Excel actual, mejorada: información limpia y segura para cerrar la venta sin errores.' },
      { t:'Descuento manual acotado', d:'El vendedor puede aplicar un descuento de negociación (5% a 15%) precargado y habilitado desde la administración central.', w:'Da flexibilidad de cierre en sucursal sin perder el control central; pedido explícito del equipo comercial.' },
      { t:'Stock por sucursal', d:'Visualización de la disponibilidad del producto discriminada por sucursal/local (en MVP puede ser una foto diaria del stock).', w:'Resuelve la no visualización del stock: condición necesaria para no ofrecer productos sin disponibilidad.' },
      { t:'Integración de lectura con Softland', d:'Consumo de datos maestros desde el ERP: productos, familias, listas de precios base y stock.', w:'Evita la doble carga de datos y garantiza una única fuente de verdad.' },
      { t:'Envío de la venta a Softland', d:'Al cerrar la operación, la aplicación envía la venta ya pre-armada (producto, promoción, descuento, precio final, medio de pago) como nota de pedido, manteniendo la reserva de stock de 24 hs.', w:'Elimina la transcripción manual —el principal generador de errores— sin asumir aún la facturación.' },
      { t:'Registro y respaldo para auditoría', d:'Trazabilidad de cada consulta y operación; ficha de condiciones imprimible para adjuntar al legajo de la venta.', w:'Reemplaza el resguardo manual de capturas durante 3 meses.' }
    ]
  },
  {
    number: 2,
    name: 'Punto de venta transaccional',
    subtitle: '(facturación y crédito)',
    status: 'pendiente',
    dependencyNote: 'Requiere que el motor de promociones de la Fase 1 esté estabilizado, y depende de integraciones externas de mayor riesgo técnico y regulatorio (ARCA, financieras).',
    goal: 'Convertir la herramienta de consulta/cotización en el punto de venta definitivo del mostrador, desplazando a Softland a un rol de backoffice.',
    items: [
      { t:'Alertas de vigencia en la aplicación', d:'Avisos sobre inicio y vencimiento de promociones dentro de la herramienta. La bajada estratégica de ofertas continúa por los canales actuales.' },
      { t:'Facturación electrónica directa', d:'Emisión de comprobantes contra ARCA desde la aplicación, con impacto contable y descarga de stock automática hacia Softland.' },
      { t:'Validación de crédito en línea', d:'Para ventas con crédito personal (Préstamo DNI), consumo de las APIs ya existentes con las financieras: se envía el DNI/CUIL del afiliado y se obtiene el límite de crédito disponible en tiempo real para autorizar el cierre.' },
      { t:'Compromiso de stock desde la aplicación', d:'Reserva de mercadería al cotizar, integrando en la herramienta la confirmación de la reserva de 24 hs.' },
      { t:'Costos financieros (CFT/TNA)', d:'Cálculo y exhibición de costos financieros por financiación con interés.' },
      { t:'Integración con BI (Visionaris)', d:'Envío del desglose de promociones aplicadas para auditar el rendimiento de campañas.' },
      { t:'Impresión / envío de comprobantes', d:'Envío de factura por email al cliente.' }
    ]
  },
  {
    number: 3,
    name: 'Optimización comercial y automatización',
    status: 'pendiente',
    dependencyNote: 'Su retorno depende de que el punto de venta de la Fase 2 ya esté adoptado y transaccionando.',
    goal: 'Funcionalidades de valor agregado que potencian la venta pero no condicionan la operación básica.',
    items: [
      { t:'Venta cruzada y productos relacionados', d:'Sugerencia automática de servicios (garantía extendida, instalación, seguros), software y accesorios junto al producto consultado, y productos de gama superior para elevar el ticket promedio.' },
      { t:'Objetivos comerciales y campañas de marca', d:'Resaltado de artículos con objetivos por sucursal o campaña dentro de la búsqueda, para incentivar ventas estratégicas.' },
      { t:'Canales B2B y múltiples listas de precios', d:'Soporte de canales institucionales (hoy tratados como "sucursales") con listas de precios y márgenes propios, automatizando una operatoria que hoy se hace a mano.' },
      { t:'Integración con pasarelas de pago', d:'Conexión con el procesador de tarjetas (Payway, Mercado Pago) para cerrar el cobro desde la aplicación.' },
      { t:'Notificaciones push al vendedor', d:'Alertas de nuevas promociones directamente en pantalla, reduciendo la dependencia de SharePoint y correos.' }
    ]
  }
];

function renderTimeline(){
  const el = document.getElementById('timeline');
  let html = '';
  phases.forEach((p, idx) => {
    if(idx > 0 && p.dependencyNote){
      html += '<div class="connector"><div class="connector-line-wrap"><p>↳ '+p.dependencyNote+'</p></div></div>';
    }
    html += '<div class="phase">'+
      '<div class="spine"></div>'+
      '<div class="node" style="--node-color:'+accentColors[p.number]+'">'+p.number+'</div>'+
      '<div class="card phase-'+p.number+'" data-idx="'+idx+'">'+
        '<div class="card-head" role="button" tabindex="0" aria-expanded="false">'+
          '<div class="card-head-main">'+
            '<div class="phase-label">Fase '+p.number+ (p.subtitle ? ' · '+p.subtitle : '') +'</div>'+
            '<h3 class="phase-title">'+p.name+'</h3>'+
            '<p class="phase-goal">'+p.goal+'</p>'+
          '</div>'+
          '<div class="card-head-side">'+
            '<span class="chevron">'+ICONS.chevron+'</span>'+
          '</div>'+
        '</div>'+
        '<div class="card-body-wrap"><div class="card-body-inner">'+
          '<div class="card-body">'+
            p.items.map(it=>{
              return '<div class="req">'+
                '<p class="req-title">'+it.t+'</p>'+
                '<p class="req-desc">'+it.d+'</p>'+
                (it.w ? '<div class="req-why">'+ICONS.spark+'<span>'+it.w+'</span></div>' : '')+
              '</div>';
            }).join('')+
          '</div>'+
        '</div></div>'+
      '</div>'+
    '</div>';
  });
  el.innerHTML = html;

  el.querySelectorAll('.card-head').forEach(head=>{
    const toggle = () => {
      const card = head.closest('.card');
      const isOpen = card.classList.toggle('is-open');
      head.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    };
    head.addEventListener('click', toggle);
    head.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggle(); }
    });
  });

  el.querySelectorAll('.card').forEach(card=>{
    card.classList.add('is-open');
    card.querySelector('.card-head').setAttribute('aria-expanded','true');
  });
}

renderTimeline();
</script>

</body>
</html>
